<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DexShell</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #020805;
      --green: #39ff14;
      --cyan: #00e5ff;
      --muted: #4f7a5c;
      --text: #b8f5c8;
      --panel: rgba(0, 18, 10, 0.78);
      --border: rgba(57, 255, 20, 0.28);
      --font: "JetBrains Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.16) 50%),
        radial-gradient(ellipse at 50% 0%, rgba(57, 255, 20, 0.08), transparent 55%);
      background-size: 100% 3px, auto;
      animation: flicker 7s infinite;
    }
    canvas#matrix {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.22;
    }
    .stage {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      padding: 36px 28px 28px;
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.12), inset 0 0 40px rgba(0, 255, 120, 0.03);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 0 auto auto -30%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.08), transparent);
      animation: sweep 5.5s linear infinite;
      pointer-events: none;
    }
    .eye {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
      margin: 0 auto 18px;
      animation: pulse 1.8s infinite;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: 0.08em;
      color: var(--green);
      text-shadow: 0 0 22px rgba(57, 255, 20, 0.45);
      text-transform: uppercase;
    }
    .sub {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .line {
      margin: 22px auto 0;
      max-width: 28ch;
      min-height: 1.4em;
      color: var(--cyan);
      font-size: 13px;
    }
    .line::after {
      content: "█";
      margin-left: 3px;
      color: var(--green);
      animation: blink 1s step-end infinite;
    }
    .foot {
      margin-top: 28px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    @keyframes sweep {
      0% { transform: translateX(0); }
      100% { transform: translateX(350%); }
    }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      93% { opacity: 0.88; }
      94% { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <main class="stage">
    <section class="panel" aria-label="DexShell">
      <div class="eye" aria-hidden="true"></div>
      <h1>Welcome to DexShell</h1>
      <p class="sub">access node</p>
      <p class="line" id="line"></p>
      <p class="foot">authorized operators only</p>
    </section>
  </main>
  <script>
    (() => {
      const c = document.getElementById("matrix");
      const ctx = c.getContext("2d");
      let w, h, cols, drops;
      const glyphs = "01アイウエオカキクケコDEXSHELL#$%";
      function resize() {
        w = c.width = window.innerWidth;
        h = c.height = window.innerHeight;
        cols = Math.floor(w / 16);
        drops = Array.from({ length: cols }, () => Math.random() * h / 16);
      }
      window.addEventListener("resize", resize);
      resize();
      function draw() {
        ctx.fillStyle = "rgba(2, 8, 5, 0.1)";
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#39ff14";
        ctx.font = "12px monospace";
        for (let i = 0; i < drops.length; i++) {
          const ch = glyphs[(Math.random() * glyphs.length) | 0];
          ctx.fillText(ch, i * 16, drops[i] * 16);
          if (drops[i] * 16 > h && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();

    const phrases = [
      "session ready",
      "waiting for handshake",
      "node is awake",
    ];
    const el = document.getElementById("line");
    let pi = 0, ci = 0, del = false;
    function tick() {
      const full = phrases[pi];
      if (!del) {
        ci++;
        el.textContent = full.slice(0, ci);
        if (ci === full.length) {
          del = true;
          setTimeout(tick, 1600);
          return;
        }
      } else {
        ci--;
        el.textContent = full.slice(0, ci);
        if (ci === 0) {
          del = false;
          pi = (pi + 1) % phrases.length;
        }
      }
      setTimeout(tick, del ? 24 : 48);
    }
    tick();
  </script>
</body>
</html>
